<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430" font-family="Helvetica Neue, Hiragino Sans, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9AA7AE"/>
    </marker>
    <marker id="arw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c98a2b"/>
    </marker>
  </defs>

  <!-- stage bands -->
  <rect x="8"   y="34" width="176" height="360" rx="10" fill="#F7F9FA"/>
  <rect x="192" y="34" width="446" height="360" rx="10" fill="#FBF7F2"/>
  <rect x="646" y="34" width="226" height="360" rx="10" fill="#F5F0F9"/>
  <text x="96"  y="26" text-anchor="middle" font-size="12.5" font-weight="700" fill="#5C6E79">① 入口</text>
  <text x="415" y="26" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9a6a2b">② 拡散（spreading）</text>
  <text x="759" y="26" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7B4FA6">③ 読み出し</text>

  <!-- ① cue → entry match -->
  <rect x="24" y="150" width="140" height="70" rx="9" fill="#fff" stroke="#D8DEDC" stroke-width="1.4"/>
  <text x="94" y="172" text-anchor="middle" font-size="10.5" fill="#5C6E79">入力発話 (cue)</text>
  <text x="94" y="192" text-anchor="middle" font-size="13" font-weight="700" fill="#26323B">「電車って</text>
  <text x="94" y="209" text-anchor="middle" font-size="13" font-weight="700" fill="#26323B">よく乗るの？」</text>
  <text x="94" y="256" text-anchor="middle" font-size="10.5" fill="#5C6E79">埋め込み → コサイン一致</text>
  <text x="94" y="271" text-anchor="middle" font-size="10.5" fill="#5C6E79">で刺激に着火（sim ≥ 0.20,</text>
  <text x="94" y="286" text-anchor="middle" font-size="10.5" fill="#5C6E79">上位3個を種火に）</text>

  <!-- entry arrow -->
  <line x1="166" y1="205" x2="206" y2="205" stroke="#9AA7AE" stroke-width="1.8" marker-end="url(#ar)"/>

  <!-- ② spreading graph -->
  <!-- edges (draw before nodes) -->
  <g stroke-width="1.6" fill="none">
    <!-- entry S0 -> hop1 -->
    <line x1="252" y1="192" x2="330" y2="118" stroke="#c98a2b" marker-end="url(#arw)"/>
    <line x1="256" y1="205" x2="330" y2="205" stroke="#c98a2b" marker-end="url(#arw)"/>
    <line x1="252" y1="222" x2="330" y2="300" stroke="#c98a2b" marker-end="url(#arw)"/>
    <!-- hop1 -> hop2 -->
    <line x1="364" y1="112" x2="470" y2="118" stroke="#c98a2b" marker-end="url(#arw)"/>
    <line x1="366" y1="210" x2="470" y2="238" stroke="#c98a2b" marker-end="url(#arw)"/>
    <!-- BINDS bridge (dashed, episode -> response of layer1) -->
    <path d="M352,296 C430,300 470,270 484,250" stroke="#2E8B3D" stroke-dasharray="4 3" marker-end="url(#arw)"/>
  </g>
  <!-- edge labels -->
  <g font-size="9.5" fill="#9a6a2b">
    <text x="278" y="146">EVOKES</text>
    <text x="286" y="197">CO_OCCURS</text>
    <text x="270" y="270">RECALLS</text>
    <text x="404" y="100">MEANS</text>
    <text x="404" y="238">EVOKES</text>
    <text x="430" y="288" fill="#2E8B3D">BINDS</text>
  </g>

  <!-- entry stimulus S0 (種火: thick border, largest) -->
  <circle cx="230" cy="205" r="24" fill="#f58231" stroke="#8a3d00" stroke-width="3"/>
  <text x="230" y="202" text-anchor="middle" font-size="9.5" fill="#fff" font-weight="700">刺激</text>
  <text x="230" y="215" text-anchor="middle" font-size="9" fill="#fff">train</text>
  <rect x="204" y="234" width="52" height="15" rx="7" fill="#fff" stroke="#c98a2b" stroke-width="1"/>
  <text x="230" y="245" text-anchor="middle" font-size="9" fill="#9a6a2b">活性 .42</text>

  <!-- hop1 nodes (r=17) -->
  <circle cx="347" cy="110" r="17" fill="#4363d8"/>
  <text x="347" y="107" text-anchor="middle" font-size="8.5" fill="#fff" font-weight="700">反応</text>
  <text x="347" y="118" text-anchor="middle" font-size="7.5" fill="#fff">身構える</text>

  <circle cx="347" cy="205" r="17" fill="#f58231"/>
  <text x="347" y="202" text-anchor="middle" font-size="8.5" fill="#fff" font-weight="700">刺激</text>
  <text x="347" y="213" text-anchor="middle" font-size="7.5" fill="#fff">tunnel</text>

  <circle cx="347" cy="300" r="17" fill="#2E8B3D"/>
  <text x="347" y="297" text-anchor="middle" font-size="8.5" fill="#fff" font-weight="700">記憶</text>
  <text x="347" y="308" text-anchor="middle" font-size="7.5" fill="#fff">襲われた</text>

  <!-- hop2 nodes (r=13, smaller = decayed) -->
  <circle cx="487" cy="112" r="13" fill="#e6194B"/>
  <text x="487" y="110" text-anchor="middle" font-size="7.5" fill="#fff" font-weight="700">意味</text>
  <text x="487" y="120" text-anchor="middle" font-size="6.5" fill="#fff">逃げられ</text>

  <circle cx="487" cy="243" r="13" fill="#4363d8"/>
  <text x="487" y="241" text-anchor="middle" font-size="7.5" fill="#fff" font-weight="700">反応</text>
  <text x="487" y="251" text-anchor="middle" font-size="6.5" fill="#fff">動悸</text>

  <!-- spreading rule note -->
  <rect x="206" y="330" width="424" height="52" rx="8" fill="#fff" stroke="#e5d5be" stroke-width="1.1"/>
  <text x="218" y="349" font-size="10" fill="#5C6E79">1ホップごとに <tspan font-weight="700" fill="#9a6a2b">×0.6 減衰</tspan>（＝円が小さくなる）・出力エッジで <tspan font-weight="700" fill="#9a6a2b">活性を分割</tspan>（fan effect）</text>
  <text x="218" y="366" font-size="10" fill="#5C6E79">結合は <tspan font-weight="700" fill="#9a6a2b">無向・対称</tspan>（逆向きにも流れる）・重みは一律・最大 <tspan font-weight="700" fill="#9a6a2b">3ホップ</tspan> で停止</text>

  <!-- ③ readout -->
  <!-- dashed collectors -->
  <g stroke="#7B4FA6" stroke-width="1.1" stroke-dasharray="3 2" fill="none">
    <line x1="500" y1="112" x2="662" y2="96"/>
    <line x1="364" y1="105" x2="662" y2="96"/>
    <line x1="500" y1="243" x2="662" y2="205"/>
    <line x1="364" y1="300" x2="662" y2="314"/>
  </g>
  <g>
    <rect x="662" y="76" width="200" height="46" rx="8" fill="#eaf0fb" stroke="#4363d8" stroke-width="1.1"/>
    <text x="672" y="94" font-size="11.5" font-weight="700" fill="#28407e">R = Σ 反応の活性</text>
    <text x="672" y="111" font-size="10" fill="#5C6E79">→ B5 生理反応</text>

    <rect x="662" y="186" width="200" height="46" rx="8" fill="#fdeaef" stroke="#e6194B" stroke-width="1.1"/>
    <text x="672" y="204" font-size="11.5" font-weight="700" fill="#a3123a">M = Σ 意味の活性</text>
    <text x="672" y="221" font-size="10" fill="#5C6E79">→ B4 心理的苦痛</text>

    <rect x="662" y="294" width="200" height="46" rx="8" fill="#e9f4ec" stroke="#2E8B3D" stroke-width="1.1"/>
    <text x="672" y="312" font-size="11.5" font-weight="700" fill="#1d6b2b">E = Σ 負エピの活性</text>
    <text x="672" y="329" font-size="10" fill="#5C6E79">→ B1 侵入記憶</text>
  </g>

  <!-- footer -->
  <text x="18" y="416" font-size="11" fill="#5C6E79">ひとつの発話が入口の刺激に着火し、恐怖構造を伝って広がる。円の大きさ＝活性（ホップごとに減衰）。最後に種類ごとに活性を合計して R / M / E を読む。</text>
</svg>
