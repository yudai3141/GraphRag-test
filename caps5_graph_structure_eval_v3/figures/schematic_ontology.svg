<svg xmlns="http://www.w3.org/2000/svg" width="760" height="330" viewBox="0 0 760 330" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9AA7AE"/></marker>
    <marker id="arB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2E8B3D"/></marker>
  </defs>
  <!-- layer 1 box -->
  <rect x="14" y="20" width="732" height="150" rx="12" fill="#FBFCFB" stroke="#0E7490" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="30" y="42" font-size="13" font-weight="700" fill="#0E7490">Fear-structure layer (Foa &amp; Kozak / Lang)</text>
  <!-- stimulus -->
  <rect x="46" y="66" width="150" height="58" rx="10" fill="#FDEFE3" stroke="#f58231" stroke-width="1.6"/>
  <text x="121" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#B05A10">STIMULUS</text>
  <text x="121" y="107" text-anchor="middle" font-size="13" font-weight="600" fill="#26323B">unknown man</text>
  <!-- response -->
  <rect x="300" y="66" width="150" height="58" rx="10" fill="#E9EDFB" stroke="#4363d8" stroke-width="1.6"/>
  <text x="375" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#4363d8">RESPONSE</text>
  <text x="375" y="107" text-anchor="middle" font-size="13" font-weight="600" fill="#26323B">racing heart</text>
  <!-- meaning -->
  <rect x="556" y="66" width="160" height="58" rx="10" fill="#FCE8ED" stroke="#e6194B" stroke-width="1.6"/>
  <text x="636" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#e6194B">MEANING</text>
  <text x="636" y="107" text-anchor="middle" font-size="13" font-weight="600" fill="#26323B">"I'm in danger"</text>
  <!-- edges L1 -->
  <line x1="196" y1="95" x2="296" y2="95" stroke="#9AA7AE" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="450" y1="95" x2="552" y2="95" stroke="#9AA7AE" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="246" y="86" text-anchor="middle" font-size="10" fill="#5C6E79">EVOKES</text>
  <text x="501" y="86" text-anchor="middle" font-size="10" fill="#5C6E79">MEANS</text>
  <text x="30" y="150" font-size="11.5" fill="#5C6E79">A cue that matches any part activates the whole structure.</text>

  <!-- layer 2 box -->
  <rect x="14" y="196" width="732" height="118" rx="12" fill="#FBFCFB" stroke="#2E8B3D" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="30" y="218" font-size="13" font-weight="700" fill="#2E8B3D">Episodic-memory layer (dual-representation theory)</text>
  <rect x="300" y="238" width="150" height="54" rx="10" fill="#E8F6EA" stroke="#2E8B3D" stroke-width="1.6"/>
  <text x="375" y="259" text-anchor="middle" font-size="11" font-weight="700" fill="#2E8B3D">EPISODE</text>
  <text x="375" y="278" text-anchor="middle" font-size="12.5" font-weight="600" fill="#26323B">that night</text>
  <!-- bridges -->
  <line x1="121" y1="124" x2="305" y2="238" stroke="#2E8B3D" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#arB)"/>
  <text x="150" y="200" font-size="10.5" font-weight="700" fill="#2E8B3D">RECALLS</text>
  <line x1="375" y1="238" x2="375" y2="126" stroke="#2E8B3D" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#arB)"/>
  <line x1="445" y1="250" x2="600" y2="126" stroke="#2E8B3D" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#arB)"/>
  <text x="470" y="210" font-size="10.5" font-weight="700" fill="#2E8B3D">BINDS</text>
  <text x="470" y="300" font-size="11.5" fill="#5C6E79">A memory = its stimulus + response + meaning, BOUND together (BINDS).</text>
</svg>
