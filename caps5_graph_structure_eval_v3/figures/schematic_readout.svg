<svg xmlns="http://www.w3.org/2000/svg" width="760" height="250" viewBox="0 0 760 250" font-family="Helvetica Neue, Arial, sans-serif">
  <defs><marker id="r2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9AA7AE"/></marker></defs>
  <!-- cue -->
  <rect x="12" y="96" width="118" height="50" rx="9" fill="#fff" stroke="#D8DEDC" stroke-width="1.4"/>
  <text x="71" y="116" text-anchor="middle" font-size="10.5" fill="#5C6E79">one cue</text>
  <text x="71" y="134" text-anchor="middle" font-size="12.5" font-weight="700" fill="#26323B">"a sound"</text>
  <line x1="130" y1="121" x2="164" y2="121" stroke="#9AA7AE" stroke-width="1.6" marker-end="url(#r2)"/>
  <text x="200" y="118" font-size="11" fill="#5C6E79">spreading</text>
  <text x="200" y="132" font-size="11" fill="#5C6E79">activation</text>
  <!-- nodes lit -->
  <circle cx="330" cy="60" r="15" fill="#4363d8"/><text x="330" y="64" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">R</text>
  <circle cx="330" cy="121" r="15" fill="#e6194B"/><text x="330" y="125" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">M</text>
  <circle cx="330" cy="182" r="15" fill="#2E8B3D"/><text x="330" y="186" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">E</text>
  <line x1="288" y1="121" x2="315" y2="66" stroke="#C6CFD3" stroke-width="1.4"/>
  <line x1="288" y1="121" x2="315" y2="121" stroke="#C6CFD3" stroke-width="1.4"/>
  <line x1="288" y1="121" x2="315" y2="177" stroke="#C6CFD3" stroke-width="1.4"/>
  <!-- readout badges -->
  <g>
    <rect x="392" y="40" width="356" height="40" rx="8" fill="#F3ECF9" stroke="#7B4FA6" stroke-width="1.1"/>
    <text x="404" y="57" font-size="12" font-weight="700" fill="#7B4FA6">B5 physiological reactivity</text>
    <text x="404" y="72" font-size="10.5" fill="#5C6E79">= activation of RESPONSE nodes (R)</text>
    <rect x="392" y="101" width="356" height="40" rx="8" fill="#F3ECF9" stroke="#7B4FA6" stroke-width="1.1"/>
    <text x="404" y="118" font-size="12" font-weight="700" fill="#7B4FA6">B4 psychological distress</text>
    <text x="404" y="133" font-size="10.5" fill="#5C6E79">= activation of threat MEANING nodes (M)</text>
    <rect x="392" y="162" width="356" height="40" rx="8" fill="#F3ECF9" stroke="#7B4FA6" stroke-width="1.1"/>
    <text x="404" y="179" font-size="12" font-weight="700" fill="#7B4FA6">B1 intrusive memory</text>
    <text x="404" y="194" font-size="10.5" fill="#5C6E79">= activation of negative EPISODE nodes (E)</text>
  </g>
  <g stroke="#7B4FA6" stroke-width="1.2" stroke-dasharray="3 2">
    <line x1="345" y1="60" x2="390" y2="60"/><line x1="345" y1="121" x2="390" y2="121"/><line x1="345" y1="182" x2="390" y2="182"/>
  </g>
  <text x="12" y="228" font-size="11.5" fill="#5C6E79">The SAME activation, read at different node types, gives three different CAPS-5 symptom signals.</text>
</svg>
